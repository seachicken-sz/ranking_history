name: Cleanup explanation episodes

on:
  push:
    paths:
      - '.github/workflows/cleanup-explanation-episodes.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove explanation episode rows
        run: node scripts/cleanup-explanation-episodes.js

      - name: Commit cleaned JSON
        run: |
          if git diff --quiet; then
            echo "No matching rows found"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_favorite
          git commit -m "Remove explanation episode history rows"
          git push
